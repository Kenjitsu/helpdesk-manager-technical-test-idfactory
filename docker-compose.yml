services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: helpdesk-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "P4zzw0rd!"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "P4zzw0rd!", "-C", "-Q", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    container_name: helpdesk-api
    build:
      context: .
      dockerfile: src/HelpDeskManager.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sql;Database=HelpDeskManager_DB;User Id=sa;Password=P4zzw0rd!;TrustServerCertificate=True;
    ports:
      - "8080:8080"
    depends_on:
      sql:
        condition: service_healthy

volumes:
  sql_data: